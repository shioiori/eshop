syntax = "proto3";

option csharp_namespace = "Discount.Grpc";

package discount;

service DiscountProtoService {
    rpc GetProductDiscount(GetProductDiscountRequest) returns (ProductDiscountModel);
    rpc GetOrderCoupon(GetOrderCouponRequest) returns (OrderCouponModel);
    rpc RedeemOrderCoupon(RedeemOrderCouponRequest) returns (RedeemOrderCouponResponse);
}

// Product discount
message ProductDiscountModel {
    int32 id = 1;
    string productName = 2;
    string description = 3;
    double amount = 4;
}

message GetProductDiscountRequest {
    string productName = 1;
}

// Order coupon
message OrderCouponModel {
    int32 id = 1;
    string code = 2;
    string description = 3;
    int32 discountType = 4;
    double amount = 5;
    double minOrderValue = 6;
}

message GetOrderCouponRequest {
    string code = 1;
    double orderTotal = 2;
}

message RedeemOrderCouponRequest {
    string code = 1;
}

message RedeemOrderCouponResponse {
    bool success = 1;
}
